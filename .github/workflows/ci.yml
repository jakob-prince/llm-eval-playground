name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check src tests
      - name: Type-check (mypy)
        run: uv run mypy src
      - name: Tests (pytest)
        run: uv run pytest
